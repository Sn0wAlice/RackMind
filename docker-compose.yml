services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: rackmind
      MYSQL_USER: rackmind
      MYSQL_PASSWORD: rackmind_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./public/images/uploads:/app/public/images/uploads
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
